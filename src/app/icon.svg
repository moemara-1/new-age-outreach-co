<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Minimalist, modern "New Age" icon -->
  <!-- Dark modern background base -->
  <rect width="100" height="100" rx="20" fill="#0C0C0C" />
  
  <!-- Glowing gradient definition -->
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Abstract 'N' and 'A' overlapping -->
  <path d="M 30,70 L 30,30 L 55,70 L 55,30" 
        fill="none" 
        stroke="url(#neonGradient)" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <path d="M 70,70 L 55,30 L 40,70" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.8" />
</svg>
